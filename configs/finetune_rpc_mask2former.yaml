experiment:
  name: mask2former_finetune_rpc_samseg
  output_dir: outputs/finetune/rpc_samseg_gpu
  seed: 0
  seeds:
  - 0
  - 1
  - 2
  device: cuda
paths:
  pretrained_backbone_ckpt: outputs/pretrain/rpc_gpu/last.pth
  mask2former_base_config: third_party/mmdetection-v3.3.0/mmdetection-3.3.0/configs/mask2former/mask2former_r50_8xb2-lsj-50e_coco.py
data:
  dataset: rpc
  root: /root/projects/ShelfMIM/dataset/archive-Retail Product Checkout Dataset/retail_product_checkout
  splits:
    train:
      image_dir: train2019
      ann_file: subset_json/instances_train2019_samseg.json
    val:
      image_dir: val2019
      ann_file: subset_json/instances_val2019_samseg.json
    test:
      image_dir: test2019
      ann_file: subset_json/instances_test2019_samseg.json
input:
  resize:
    keep_aspect_ratio: true
    short_side: 512
    long_side_max: 1024
    interpolation: bilinear
  pad:
    enabled: true
    pad_right_bottom_only: true
    value: 0
    size_divisor: 32
  normalize:
    mean:
    - 0.485
    - 0.456
    - 0.406
    std:
    - 0.229
    - 0.224
    - 0.225
model:
  name: mask2former
  backbone:
    name: vit_base_patch16
    init_from: ssl_pretrained
    freeze_layernorm: false
    lr_multiplier: 0.1
train:
  epochs: 30
  batch_size_total: 1
  num_workers: 4
  amp:
    enabled: true
    dtype: fp16
  grad_clip_norm: 1.0
  eval_interval_epochs: 1
  checkpoint:
    save_best_metric: coco/segm_mAP
    save_best_rule: greater
    max_keep_ckpts: 1
    save_last: true
optimizer:
  name: adamw
  base_lr: 0.0001
  weight_decay: 0.05
scheduler:
  name: cosine_decay
  warmup_epochs: 0
  min_lr: 0.0
inference:
  score_threshold: 0.05
  max_instances_per_image: 100
metrics:
  list:
  - dice
  - iou
  - asd
  - hd95
  report_split: test
test:
  seeds:
  - 0
  - 1
  - 2
  aggregate: mean_std
