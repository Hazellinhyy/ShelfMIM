experiment:
  name: shelfmim_pretrain_rpc
  output_dir: outputs/pretrain/rpc_gpu
  seed: 0
data:
  dataset: rpc
  root: /root/projects/ShelfMIM/dataset/archive-Retail Product Checkout Dataset/retail_product_checkout
  split:
    pretrain: train
  use_rgb_only: true
  use_annotations: false
  mix_datasets: false
input:
  format: full_image
  resize:
    keep_aspect_ratio: true
    short_side: 192
    long_side_max: 192
    interpolation: bilinear
  pad:
    enabled: true
    mode: constant
    value: 0
    pad_right_bottom_only: true
    size_divisor: 16
  normalize:
    mean:
    - 0.485
    - 0.456
    - 0.406
    std:
    - 0.229
    - 0.224
    - 0.225
augmentation:
  view_a:
    color_jitter:
      enabled: true
      brightness: 0.4
      contrast: 0.4
      saturation: 0.4
      hue: 0.1
    grayscale_prob: 0.2
    gaussian_blur_prob: 0.5
    horizontal_flip_prob: 0.0
  view_b:
    random_resized_crop:
      enabled: true
      scale:
      - 0.5
      - 1.0
      ratio:
      - 0.75
      - 1.333
    random_affine:
      enabled: false
      degrees: 8.0
      translate:
      - 0.06
      - 0.06
      scale:
      - 0.95
      - 1.05
      prob: 0.3
    random_perspective:
      enabled: true
      distortion_scale: 0.15
      prob: 0.4
    horizontal_flip_prob: 0.5
    record_homography: true
model:
  backbone:
    name: vit_base_patch16
    patch_size: 16
  branch_i_slot:
    slots_k: 7
    slot_attention:
      iters: 3
      epsilon: 1.0e-06
    matching:
      method: hungarian
      cost: dice
    contrastive:
      temperature_tau: 0.2
  branch_ii_proto:
    prototypes:
      kg: 4096
      kp: 1024
    assignment:
      temperature_tau_p: 0.1
    ema:
      prototype_momentum_m: 0.99
      aux_ema_momentum: 0.96
  branch_iii_cs_hps:
    patch_size: 16
    masking:
      ratio_r: 0.25
      sampler: gumbel_topk_st
      gumbel_tau: 1.0
    content_style:
      enabled: true
      heads:
        content_dim: 256
        style_dim: 256
        hidden_dim: 1024
        dropout: 0.0
        l2_normalize: false
    policy:
      hidden_dim: 256
      dropout: 0.0
      detach_input: true
    geometry_consistency:
      enabled: true
    decoder:
      decoder_dim: 384
      depth: 3
      heads: 6
      mlp_ratio: 4.0
      drop: 0.0
      pos_base_grid_hw:
      - 12
      - 12
    reconstruction:
      mask_token: learnable
loss:
  lambda_proto: 0.10
  lambda_cs_hps: 0.30
  auto_scale_proto: false
  auto_scale_cs: false
  scale_eps: 1.0e-06
  scale_clip: 10.0
  branch_warmup_epochs: 3
  alpha_mask: 1.0
  alpha_nce: 0.1
  lambda_pp: 1.0
  lambda_bal: 0.0
  lambda_sharp: 0.03
  lambda_consistency: 0.0
  proto_consistency_temperature: 1.6
  proto_consistency_conf_thresh: 0.40
  proto_consistency_part_weight: 0.25
  proto_consistency_use_part: false
  lambda_mim: 1.0
  lambda_cont: 1.0
  lambda_decorr: 0.1
  lambda_geom: 0.25
  lambda_mim_visible: 0.10
  scale_min: 0.5
  scale_power: 0.5
  alpha_nce_warmup_epochs: 10
  nce_use_valid_slots: true
  slot_conf_thresh: 0.25
optimizer:
  name: adamw
  base_lr: 8.0e-05
  betas:
  - 0.9
  - 0.95
  weight_decay: 0.05
scheduler:
  name: cosine_decay
  warmup_epochs: 3
  min_lr: 0.0
runtime:
  device: cuda
  gpu_ids:
  - 0
  cudnn_benchmark: true
  tf32:
    enabled: true
distributed:
  enabled: false
  backend: nccl
  find_unused_parameters: false
train:
  epochs: 60
  batch_size_total: 2
  grad_accum_steps: 1
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  amp:
    enabled: true
    dtype: fp16
  grad_clip_norm: 1.0
  log_interval: 50
  save_interval_epochs: 10
  vis_epoch_interval: 10
  proto_vis_epoch_interval: 10
  proto_vis_force: true
  proto_vis:
    topM_global: 100
    topM_part: 60
  drop_last: true
