# ShelfMIM pretrain on MVTec D2S (in-domain; do NOT mix datasets)
experiment:
  name: shelfmim_pretrain_d2s
  output_dir: outputs/pretrain/d2s
  seed: 0

data:
  dataset: mvtec_d2s
  root: "C:/Users/lenovo/PycharmProjects/ShelfMIM-Master/dataset/mvtec_d2s"
  split:
    pretrain: train
  use_rgb_only: true
  use_annotations: false
  mix_datasets: false

input:
  format: full_image
  resize:
    keep_aspect_ratio: true
    short_side: 768
    long_side_max: 1536
    interpolation: bilinear
  pad:
    enabled: true
    mode: constant
    value: 0
    pad_right_bottom_only: true
    size_divisor: 16
  normalize:
    mean: [0.485, 0.456, 0.406]
    std:  [0.229, 0.224, 0.225]

augmentation:
  view_a:
    color_jitter:
      enabled: true
      brightness: 0.4
      contrast: 0.4
      saturation: 0.4
      hue: 0.1
    grayscale_prob: 0.2
    gaussian_blur_prob: 0.5
    horizontal_flip_prob: 0
  view_b:
    random_resized_crop:
      enabled: true
      scale: [0.5, 1.0]
      ratio: [0.75, 1.333]
    random_perspective:
      enabled: true
      distortion_scale: 0.3
      prob: 0.7
    horizontal_flip_prob: 0.5
    record_homography: true

model:
  backbone:
    name: vit_base_patch16
    patch_size: 16
  branch_i_slot:
    slots_k: 8
    slot_attention:
      iters: 3
      epsilon: 1.0e-6
    matching:
      method: hungarian
      cost: dice
    contrastive:
      temperature_tau: 0.2
  branch_ii_proto:
    prototypes:
      kg: 8192
      kp: 2048
    assignment:
      temperature_tau_p: 0.1
    ema:
      prototype_momentum_m: 0.99
      aux_ema_momentum: 0.96
  branch_iii_cs_hps:
    patch_size: 16

    masking:
      ratio_r: 0.70
      sampler: gumbel_topk_st
      gumbel_tau: 1.0   # ✅ 新增：gumbel 温度

    content_style:
      enabled: true
      heads: # ✅ 新增：给 heads.py 用
        content_dim: 256
        style_dim: 256
        hidden_dim: 1536
        dropout: 0.0
        l2_normalize: false

    policy: # ✅ 新增：给 policy.py 用
      hidden_dim: 256
      dropout: 0.0
      detach_input: true

    geometry_consistency:
      enabled: true

    decoder: # ✅ 新增：给 decoder.py 用
      decoder_dim: 512
      depth: 4
      heads: 8
      mlp_ratio: 4.0
      drop: 0.0
      pos_base_grid_hw: [ 14, 14 ]

    reconstruction:
      mask_token: learnable

loss:
  lambda_proto: 0.10
  lambda_cs_hps: 0.30
  alpha_mask: 1.0
  alpha_nce: 0.1
  lambda_pp: 1.0
  lambda_bal: 0.0
  lambda_sharp: 0.03
  lambda_consistency: 0.0
  proto_consistency_temperature: 1.6
  proto_consistency_conf_thresh: 0.40
  proto_consistency_part_weight: 0.25
  proto_consistency_use_part: false
  lambda_mim: 1.0
  lambda_cont: 1.0
  lambda_decorr: 0.1
  lambda_geom: 0.25
  lambda_mim_visible: 0.10

optimizer:
  name: adamw
  base_lr: 1.5e-4
  betas: [0.9, 0.95]
  weight_decay: 0.05

scheduler:
  name: cosine_decay
  warmup_epochs: 10
  min_lr: 0.0

train:
  epochs: 300
  batch_size_total: 64
  num_workers: 8
  amp:
    enabled: true
  grad_clip_norm: 1.0
  log_interval: 50
  save_interval_epochs: 10
  vis_interval: 200
